<div class="w-full">
  <!-- Estado de carregamento -->
  <div *ngIf="isLoading" class="text-sm text-black py-2">Carregando perguntas...</div>

  <!-- Estado de erro -->
  <div *ngIf="hasError && !isLoading" class="text-sm text-red-600 py-2">
    Não foi possível carregar as perguntas. Verifique o arquivo
    <code>assets/faq-data.json</code>.
  </div>

  <!-- Lista dinâmica de perguntas e respostas -->
  <div
    *ngFor="let item of items; trackBy: trackByFaqId; let last = last"
    class="collapse collapse-plus bg-white border border-blueCap-300 w-100 md:w-130"
    [class.mb-1]="!last"
  >
    <input type="radio" [name]="groupName" />
    <div class="collapse-title font-semibold text-black flex items-center justify-between">
      <span>{{ item.question }}</span>
    </div>
    <div class="collapse-content text-sm text-black w-100 md:w-130">
      {{ item.answer }}

      <!-- Botão opcional para remover a pergunta em tempo de execução 
      <button
        type="button"
        (click)="removeQuestion(item.id)"
        class="block mt-2 text-xs text-red-600 hover:underline"
      >
        Remover pergunta
      </button>-->
    </div>
  </div>

  <!-- Estado vazio -->
  <div *ngIf="!isLoading && !hasError && items.length === 0" class="text-sm text-black py-2">
    Nenhuma pergunta cadastrada no momento.
  </div>
</div>
